description: |
  Sensor driver for the Azoteq IQS5XX trackpad IC
compatible: "azoteq,iqs5xx"

include: base.yaml

on-bus: i2c

properties:
  label:
    type: string
    required: true

  dr-gpios:
    type: phandle-array
    required: true
    description: Data ready pin for the trackpad

  invert-x:
    type: boolean
    description: Invert X axis movement

  invert-y:
    type: boolean
    description: Invert Y axis movement

  # support input device
  input:
    type: phandle
    description: Input device for trackpad events
